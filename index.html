                    { x: 680, y: 150, collected: false },
                ],
                heart: { x: 300, y: 190, collected: false },
                gems: [
                    { x: 20, y: 120, collected: false },
                    { x: 730, y: 270, collected: false },
                ],
                playerStart: { x: 50, y: 500 }
            },
        ];

        function loadLevel(lvl) {
            const config = levels[lvl - 1];
            platforms.length = 0;
            for (const p of config.platforms) platforms.push({...p});
            enemies.length = 0;
            for (const e of config.enemies) {
                const enemy = {...e};
                if (enemy.shootTimer === undefined) enemy.shootTimer = 0;
                enemies.push(enemy);
            }
            treasure = {...config.treasure};
            sword = {...config.sword};
            torches = [];
            for (const t of config.torches) torches.push({...t, w: 16, h: 24});
            thrownTorch = null;
            torchCount = 0;
            if (config.heart) {
                hearts = [{...config.heart, w: 20, h: 18, collected: false}];
            } else {
                hearts = [];
            }
            gems = [];
            if (config.gems) {
                for (const g of config.gems) gems.push({...g, w: 16, h: 16});
            }
            powerups = [];
            if (config.powerups) {
                for (const p of config.powerups) powerups.push({...p, w: 20, h: 20});
            }
            secretRoom = null;
            if (config.secretRoom) {
                secretRoom = {...config.secretRoom, discovered: false};
                if (secretRoom.platforms) {
                    secretRoom.platforms = secretRoom.platforms.map(p => ({...p}));
                }
                if (secretRoom.gems) {
                    secretRoom.gems = secretRoom.gems.map(g => ({...g, w: 16, h: 16}));
                }
            }
            projectiles = [];
            player.x = config.playerStart.x;
            player.y = config.playerStart.y;
            player.hasDoubleJump = false;
            player.hasDash = false;
            player.canDoubleJump = false;
            player.canDash = false;
            boss = null;
            bossActive = false;
            
            if (level === 5 || level === 10) {
                boss = {
                    x: 400, y: 100, w: 64, h: 64,
                    vx: 2, vy: 0, health: 20, maxHealth: 20,
                    type: 'boss', hit: false, hitTimer: 0,
                    phase: 1, attackTimer: 0, pattern: 'hover'
                };
                bossActive = true;
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'attack') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'enemyDeath') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'treasure') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.setValueAtTime(700, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'sword') {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1320, audioCtx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.1);
                gain2.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc2.start();
                osc2.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'hurt') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(500, audioCtx.currentTime + 0.15);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.3);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.45);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        function resumeAudio() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.addEventListener('keydown', resumeAudio);
        document.addEventListener('click', resumeAudio);

        function rectCollision(a, b) {
            return a.x < b.x + b.w && a.x + a.width > b.x &&
                   a.y < b.y + b.h && a.y + a.height > b.y;
        }

        function updatePlayer() {
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx -= 1;
                player.facing = -1;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx += 1;
                player.facing = 1;
            }
            const jumpPressed = (keys['ArrowUp'] || keys['KeyW'] || keys['Space']);
            
            if (jumpPressed && !player.jumpHeld) {
                if (player.grounded) {
                    player.vy = player.jump;
                    player.grounded = false;
                    player.canDoubleJump = player.hasDoubleJump;
                    playSound('jump');
                } else if (player.hasDoubleJump && player.canDoubleJump) {
                    player.vy = player.jump * 0.85;
                    player.canDoubleJump = false;
                    player.grounded = false;
                    playSound('jump');
                }
            }
            player.jumpHeld = jumpPressed;
            
            if ((keys['ShiftLeft'] || keys['ShiftRight']) && player.hasDash && !player.dashing) {
                player.dashing = true;
                player.dashTimer = 10;
                player.vx = player.facing * 30;
                player.vy = 0;
            }
            if (player.dashing) {
                player.dashTimer--;
                player.vx = player.facing * 30;
                if (player.dashTimer <= 0) {
                    player.dashing = false;
                    player.vx = player.facing * 5;
                }
            }
            
            if ((keys['KeyZ'] || keys['KeyK']) && player.attackCooldown <= 0 && sword.collected) {
                player.attacking = true;
                playSound('attack');
                player.attackTimer = 10;
                player.attackCooldown = 20;
            }

            player.vx *= FRICTION;
            player.vy += GRAVITY;
            player.vx = Math.max(-player.speed, Math.min(player.speed, player.vx));

            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;
            for (const plat of platforms) {
                if (player.x + player.width > plat.x && player.x < plat.x + plat.w &&
                    player.y + player.height > plat.y && player.y < plat.y + plat.h) {
                    if (player.vy > 0 && player.y + player.height - player.vy <= plat.y) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.grounded = true;
                        if (plat.moving) {
                            player.y += plat.vy * plat.dir;
                        }
                    }
                }
            }
            
            if (secretRoom && secretRoom.discovered && secretRoom.platforms) {
                for (const plat of secretRoom.platforms) {
                    if (player.x + player.width > plat.x && player.x < plat.x + plat.w &&
                        player.y + player.height > plat.y && player.y < plat.y + plat.h) {
                        if (player.vy > 0 && player.y + player.height - player.vy <= plat.y) {
                            player.y = plat.y - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        }
                    }
                }
            }

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            if (player.y > canvas.height) {
                player.health = 3;
                player.x = 100;
                player.y = 400;
            }

            if (!treasure.collected && level <= 10) {
                const bossDefeated = (level !== 5 && level !== 10) || !bossActive;
                if (enemies.length === 0 && bossDefeated && player.x + player.width > treasure.x && player.x < treasure.x + treasure.w &&
                    player.y + player.height > treasure.y && player.y < treasure.y + treasure.h) {
                    treasure.collected = true;
                    saveGame();
                    if (level < 10) {
                        level++;
                        playSound('treasure');
                        loadLevel(level);
                    } else {
                        playSound('win');
                    }
                }
            }

            if (!sword.collected && gameState === 'playing') {
                if (player.x + player.width > sword.x && player.x < sword.x + sword.w &&
                    player.y + player.height > sword.y && player.y < sword.y + sword.h) {
                    sword.collected = true;
                    playSound('sword');
                }
            }

            for (let i = torches.length - 1; i >= 0; i--) {
                const t = torches[i];
                if (!t.collected && gameState === 'playing') {
                    if (player.x + player.width > t.x && player.x < t.x + t.w &&
                        player.y + player.height > t.y && player.y < t.y + t.h) {
                        t.collected = true;
                        torchCount++;
                        playSound('treasure');
                    }
                }
            }

            for (let i = hearts.length - 1; i >= 0; i--) {
                const h = hearts[i];
                if (!h.collected && gameState === 'playing') {
                    if (player.x + player.width > h.x && player.x < h.x + h.w &&
                        player.y + player.height > h.y && player.y < h.y + h.h) {
                        h.collected = true;
                        if (player.health < 5) {
                            player.health++;
                            playSound('treasure');
                        }
                    }
                }
            }

            for (let i = gems.length - 1; i >= 0; i--) {
                const g = gems[i];
                if (!g.collected && gameState === 'playing') {
                    if (player.x + player.width > g.x && player.x < g.x + g.w &&
                        player.y + player.height > g.y && player.y < g.y + g.h) {
                        g.collected = true;
                        score += 50;
                        playSound('treasure');
                        for (let j = 0; j < 8; j++) {
                            particles.push({
                                x: g.x + g.w/2, y: g.y + g.h/2,
                                vx: (Math.random() - 0.5) * 8,
                                vy: (Math.random() - 0.5) * 8,
                                life: 20, color: '#00ffff'
                            });
                        }
                    }
                }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                if (!p.collected && gameState === 'playing') {
                    if (player.x + player.width > p.x && player.x < p.x + p.w &&
                        player.y + player.height > p.y && player.y < p.y + p.h) {
                        p.collected = true;
                        if (p.type === 'doubleJump') {
                            player.hasDoubleJump = true;
                            player.canDoubleJump = true;
                        } else if (p.type === 'dash') {
                            player.hasDash = true;
                            player.canDash = true;
                        }
                        playSound('sword');
                        for (let j = 0; j < 15; j++) {
                            particles.push({
                                x: p.x + p.w/2, y: p.y + p.h/2,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                life: 30, color: '#ff00ff'
                            });
                        }
                    }
                }
            }

            if (secretRoom && !secretRoom.discovered) {
                if (player.x < secretRoom.x + secretRoom.w && player.x + player.width > secretRoom.x &&
                    player.y < secretRoom.y + secretRoom.h && player.y + player.height > secretRoom.y) {
                    secretRoom.discovered = true;
                    player.inSecretRoom = true;
                    playSound('treasure');
                }
            }
            
            if (secretRoom && secretRoom.discovered && player.inSecretRoom) {
                if (player.x < secretRoom.x - 10 || player.x > secretRoom.x + secretRoom.w + 10 ||
                    player.y < secretRoom.y - 10 || player.y > secretRoom.y + secretRoom.h + 10) {
                    player.inSecretRoom = false;
                }
                
                for (let i = secretRoom.gems.length - 1; i >= 0; i--) {
                    const g = secretRoom.gems[i];
                    if (!g.collected && gameState === 'playing') {
                        if (player.x + player.width > g.x && player.x < g.x + g.w &&
                            player.y + player.height > g.y && player.y < g.y + g.h) {
                            g.collected = true;
                            score += 50;
                            playSound('treasure');
                            for (let j = 0; j < 8; j++) {
                                particles.push({
                                    x: g.x + g.w/2, y: g.y + g.h/2,
                                    vx: (Math.random() - 0.5) * 8,
                                    vy: (Math.random() - 0.5) * 8,
                                    life: 20, color: '#00ffff'
                                });
                            }
                        }
                    }
                }
            }

            if ((keys['KeyX'] || keys['KeyJ']) && torchCount > 0 && !thrownTorch) {
                thrownTorch = {
                    x: player.x + player.width / 2,
                    y: player.y,
                    vx: player.facing * 10,
                    vy: -5,
                    timer: 60
                };
                torchCount--;
            }

            if (thrownTorch) {
                thrownTorch.x += thrownTorch.vx;
                thrownTorch.vy += 0.4;
                thrownTorch.y += thrownTorch.vy;
                thrownTorch.timer--;

                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    if (thrownTorch.x > e.x && thrownTorch.x < e.x + e.w &&
                        thrownTorch.y > e.y && thrownTorch.y < e.y + e.h) {
                        for (let j = 0; j < 15; j++) {
                            particles.push({
                                x: e.x + e.w/2, y: e.y + e.h/2,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                life: 30, color: '#ff6600'
                            });
                        }
                        enemies.splice(i, 1);
                        score += 150;
                        playSound('enemyDeath');
                        thrownTorch = null;
                        break;
                    }
                }

                if (thrownTorch && (thrownTorch.y > 600 || thrownTorch.timer <= 0 || thrownTorch.x < 0 || thrownTorch.x > 800)) {
                    for (let j = 0; j < 10; j++) {
                        particles.push({
                            x: thrownTorch.x, y: thrownTorch.y,
                            vx: (Math.random() - 0.5) * 6,
                            vy: (Math.random() - 0.5) * 6,
                            life: 20, color: '#ff6600'
                        });
                    }
                    thrownTorch = null;
                }
            }

            if (player.attacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.attacking = false;
            }
            if (player.attackCooldown > 0) player.attackCooldown--;

            if (player.invincible > 0) player.invincible--;
        }

        function updatePlatforms() {
            for (const plat of platforms) {
                if (plat.moving) {
                    plat.y += plat.vy * plat.dir;
                    if (plat.y >= plat.startY) plat.dir = -1;
                    if (plat.y <= plat.endY) plat.dir = 1;
                }
            }
        }

        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                
                if (e.hitTimer <= 0) {
                    e.x += e.vx;
                    let onPlatform = false;
                    for (const plat of platforms) {
                        if (e.x + e.w > plat.x && e.x < plat.x + plat.w &&
                            e.y + e.h >= plat.y && e.y + e.h <= plat.y + 5) {
                            onPlatform = true;
                            if (plat.moving) {
                                e.y += plat.vy * plat.dir;
                            }
                        }
                    }
                    if (e.x <= 0 || e.x + e.w >= canvas.width || !onPlatform) {
                        e.vx *= -1;
                    }
                }

                if (e.type === 'purple' && e.shootTimer > 0) {
                    e.shootTimer--;
                    if (e.shootTimer <= 0) {
                        const dir = player.x < e.x ? -1 : 1;
                        projectiles.push({
                            x: e.x + e.w/2,
                            y: e.y + e.h/2,
                            vx: dir * 4,
                            vy: 0,
                            life: 180
                        });
                        e.shootTimer = 120 + Math.random() * 60;
                    }
                }

                if (player.invincible <= 0 && rectCollision(player, {x: e.x, y: e.y, w: e.w, h: e.h})) {
                    player.health--;
                    player.invincible = 60;
                    player.vy = -8;
                    player.vx = player.facing * -5;
                    playSound('hurt');
                }

                if (player.attacking && player.attackTimer > 5) {
                    const ax = player.facing === 1 ? player.x + player.width : player.x - 50;
                    const attackHitbox = { x: ax, y: player.y - 10, w: 50, h: player.height + 20 };
                    if (attackHitbox.x < e.x + e.w && attackHitbox.x + attackHitbox.w > e.x &&
                        attackHitbox.y < e.y + e.h && attackHitbox.y + attackHitbox.h > e.y) {
                        if (e.hitTimer <= 0) {
                            e.health -= 1;
                            e.hitTimer = 15;
                            e.vx = player.facing;
                            playSound('hit');
                            for (let j = 0; j < 5; j++) {
                                particles.push({
                                    x: e.x + e.w/2, y: e.y + e.h/2,
                                    vx: (Math.random() - 0.5) * 6,
                                    vy: (Math.random() - 0.5) * 6,
                                    life: 20, color: '#ff0'
                                });
                            }
                        }
                    }
                }
                
                if (e.hitTimer > 0) {
                    e.hitTimer--;
                    if (e.hitTimer <= 0 && e.health <= 0) {
                        enemies.splice(i, 1);
                        score += 100;
                        playSound('enemyDeath');
                        for (let j = 0; j < 10; j++) {
                            particles.push({
                                x: e.x + e.w/2, y: e.y + e.h/2,
                                vx: (Math.random() - 0.5) * 8,
                                vy: (Math.random() - 0.5) * 8,
                                life: 30, color: '#f00'
                            });
                        }
                    }
                }
            }
        }

        function updateBoss() {
            if (!boss || !bossActive) return;
            
            boss.attackTimer++;
            
            if (boss.phase === 1) {
                boss.x += boss.vx;
                if (boss.x <= 50 || boss.x + boss.w >= canvas.width - 50) {
                    boss.vx *= -1;
                }
                
                if (boss.attackTimer > 60) {
                    boss.attackTimer = 0;
                    const dir = player.x < boss.x ? -1 : 1;
                    for (let i = 0; i < 3; i++) {
                        projectiles.push({
                            x: boss.x + boss.w/2,
                            y: boss.y + boss.h/2,
                            vx: dir * 3,
                            vy: (i - 1) * 2,
                            life: 200,
                            isBossProjectile: true
                        });
                    }
                }
            } else if (boss.phase === 2) {
                boss.y += Math.sin(boss.attackTimer * 0.1) * 2;
                
                if (boss.attackTimer > 45) {
                    boss.attackTimer = 0;
                    for (let i = 0; i < 5; i++) {
                        const angle = (i / 5) * Math.PI * 2;
                        projectiles.push({
                            x: boss.x + boss.w/2,
                            y: boss.y + boss.h/2,
                            vx: Math.cos(angle) * 3,
                            vy: Math.sin(angle) * 3,
                            life: 150,
                            isBossProjectile: true
                        });
                    }
                }
            }
            
            if (boss.health <= boss.maxHealth * 0.5 && boss.phase === 1) {
                boss.phase = 2;
                boss.attackTimer = 0;
            }
            
            if (player.invincible <= 0 && rectCollision(player, {x: boss.x, y: boss.y, w: boss.w, h: boss.h})) {
                player.health--;
                player.invincible = 60;
                player.vy = -8;
                player.vx = player.facing * -5;
                playSound('hurt');
            }
            
            if (player.attacking && player.attackTimer > 5) {
                const ax = player.facing === 1 ? player.x + player.width : player.x - 50;
                const attackHitbox = { x: ax, y: player.y - 10, w: 50, h: player.height + 20 };
                if (attackHitbox.x < boss.x + boss.w && attackHitbox.x + attackHitbox.w > boss.x &&
                    attackHitbox.y < boss.y + boss.h && attackHitbox.y + attackHitbox.h > boss.y) {
                    if (boss.hitTimer <= 0) {
                        boss.health -= 1;
                        boss.hitTimer = 10;
                        boss.hit = true;
                        playSound('hit');
                        for (let j = 0; j < 8; j++) {
                            particles.push({
                                x: boss.x + boss.w/2, y: boss.y + boss.h/2,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                life: 20, color: '#ffff00'
                            });
                        }
                    }
                }
            }
            
            if (boss.hitTimer > 0) {
                boss.hitTimer--;
                boss.hit = false;
            }
            
            if (boss.health <= 0) {
                for (let j = 0; j < 30; j++) {
                    particles.push({
                        x: boss.x + boss.w/2, y: boss.y + boss.h/2,
                        vx: (Math.random() - 0.5) * 15,
                        vy: (Math.random() - 0.5) * 15,
                        life: 50, color: '#ff0000'
                    });
                }
                score += 500;
                bossActive = false;
                boss = null;
                playSound('win');
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function updateProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.vx;
                p.life--;
                
                if (p.life <= 0 || p.x < 0 || p.x > canvas.width) {
                    projectiles.splice(i, 1);
                    continue;
                }
                
                if (player.invincible <= 0 && 
                    p.x > player.x && p.x < player.x + player.width &&
                    p.y > player.y && p.y < player.y + player.height) {
                    player.health--;
                    player.invincible = 60;
                    player.vy = -8;
                    player.vx = player.facing * -5;
                    playSound('hurt');
                    projectiles.splice(i, 1);
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#4a4a6a';
            for (const plat of platforms) {
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.fillStyle = '#5a5a7a';
                ctx.fillRect(plat.x, plat.y, plat.w, 4);
                ctx.fillStyle = '#4a4a6a';
            }

            if (secretRoom && !secretRoom.discovered) {
                ctx.fillStyle = 'rgba(100, 50, 50, 0.5)';
                ctx.fillRect(secretRoom.x, secretRoom.y, secretRoom.w, secretRoom.h);
                ctx.strokeStyle = '#663333';
                ctx.lineWidth = 2;
                ctx.strokeRect(secretRoom.x, secretRoom.y, secretRoom.w, secretRoom.h);
            }
            
            if (secretRoom && secretRoom.discovered && secretRoom.platforms) {
                ctx.fillStyle = '#4a4a6a';
                for (const plat of secretRoom.platforms) {
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.fillStyle = '#5a5a7a';
                    ctx.fillRect(plat.x, plat.y, plat.w, 4);
                    ctx.fillStyle = '#4a4a6a';
                }
                for (const g of secretRoom.gems) {
                    if (!g.collected) {
                        const bob = Math.sin(Date.now() / 200) * 2;
                        ctx.fillStyle = '#00ffff';
                        ctx.beginPath();
                        ctx.moveTo(g.x + 8, g.y + bob);
                        ctx.lineTo(g.x + 16, g.y + 6 + bob);
                        ctx.lineTo(g.x + 8, g.y + 16 + bob);
                        ctx.lineTo(g.x, g.y + 6 + bob);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            }

            for (const p of powerups) {
                if (!p.collected) {
                    const bob = Math.sin(Date.now() / 200) * 3;
                    if (p.type === 'doubleJump') {
                        ctx.fillStyle = '#00ff00';
                        ctx.beginPath();
                        ctx.arc(p.x + 10, p.y + 10 + bob, 10, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '12px Arial';
                        ctx.fillText('^', p.x + 6, p.y + 14 + bob);
                    } else if (p.type === 'dash') {
                        ctx.fillStyle = '#ff00ff';
                        ctx.fillRect(p.x + 2, p.y + bob, 16, 12);
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(p.x + 6, p.y + 4 + bob, 8, 6);
                    }
                }
            }

            if (boss && bossActive) {
                ctx.fillStyle = boss.hit ? '#ffffff' : '#ff4444';
                ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(boss.x + 10, boss.y + 15, 12, 12);
                ctx.fillRect(boss.x + 42, boss.y + 15, 12, 12);
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(boss.x + 14, boss.y + 19, 4, 4);
                ctx.fillRect(boss.x + 46, boss.y + 19, 4, 4);
                ctx.fillStyle = boss.phase === 2 ? '#ff8800' : '#880000';
                ctx.beginPath();
                ctx.arc(boss.x + 32, boss.y + 45, 8, 0, Math.PI);
                ctx.fill();
                
                ctx.fillStyle = '#333';
                ctx.fillRect(200, 30, 400, 20);
                ctx.fillStyle = boss.health > boss.maxHealth * 0.5 ? '#00ff00' : '#ff8800';
                ctx.fillRect(202, 32, 396 * (boss.health / boss.maxHealth), 16);
            }

            if (!treasure.collected) {
                if (enemies.length === 0) {
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(treasure.x, treasure.y, treasure.w, treasure.h);
                    ctx.fillStyle = '#ffaa00';
                    ctx.fillRect(treasure.x + 4, treasure.y + 4, treasure.w - 8, 4);
                    ctx.fillStyle = '#ffff00';
                    ctx.fillRect(treasure.x + 8, treasure.y - 6, 8, 6);
                } else {
                    ctx.fillStyle = '#555';
                    ctx.fillRect(treasure.x, treasure.y, treasure.w, treasure.h);
                    ctx.fillStyle = '#444';
                    ctx.fillRect(treasure.x + 4, treasure.y + 4, treasure.w - 8, 4);
                    ctx.fillStyle = '#666';
                    ctx.fillRect(treasure.x + 8, treasure.y - 6, 8, 6);
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px Arial';
                    ctx.fillText('LOCKED', treasure.x - 8, treasure.y - 5);
                }
            }

            if (!sword.collected) {
                ctx.fillStyle = '#c0c0c0';
                ctx.fillRect(sword.x + 8, sword.y, 4, 20);
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(sword.x + 4, sword.y + 16, 12, 6);
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(sword.x + 6, sword.y - 6, 8, 6);
            }

            for (const t of torches) {
                if (!t.collected) {
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(t.x + 5, t.y + 12, 6, 12);
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.arc(t.x + 8, t.y + 8, 8 + Math.random() * 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.arc(t.x + 8, t.y + 8, 5 + Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (const h of hearts) {
                if (!h.collected) {
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.moveTo(h.x + 10, h.y + 4);
                    ctx.bezierCurveTo(h.x + 10, h.y, h.x, h.y, h.x, h.y + 4);
                    ctx.bezierCurveTo(h.x, h.y + 10, h.x + 10, h.y + 16, h.x + 10, h.y + 18);
                    ctx.bezierCurveTo(h.x + 10, h.y + 16, h.x + 20, h.y + 10, h.x + 20, h.y + 4);
                    ctx.bezierCurveTo(h.x + 20, h.y, h.x + 10, h.y, h.x + 10, h.y + 4);
                    ctx.fill();
                    ctx.fillStyle = '#ffaaaa';
                    ctx.beginPath();
                    ctx.arc(h.x + 6, h.y + 6, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (const g of gems) {
                if (!g.collected) {
                    const bob = Math.sin(Date.now() / 200) * 2;
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.moveTo(g.x + 8, g.y + bob);
                    ctx.lineTo(g.x + 16, g.y + 6 + bob);
                    ctx.lineTo(g.x + 8, g.y + 16 + bob);
                    ctx.lineTo(g.x, g.y + 6 + bob);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#aaffff';
                    ctx.beginPath();
                    ctx.arc(g.x + 6, g.y + 6 + bob, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            if (thrownTorch) {
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(thrownTorch.x - 3, thrownTorch.y - 10, 6, 12);
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.arc(thrownTorch.x, thrownTorch.y - 6, 10 + Math.random() * 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(thrownTorch.x, thrownTorch.y - 6, 6 + Math.random() * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            for (const e of enemies) {
                let color;
                if (e.type === 'purple') {
                    color = e.hitTimer > 0 ? '#ffffff' : '#9933cc';
                } else {
                    color = e.hitTimer > 0 ? '#ffffff' : (e.type === 'red' ? '#cc3333' : '#3333cc');
                }
                ctx.fillStyle = color;
                ctx.fillRect(e.x, e.y, e.w, e.h);
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(e.x + 6, e.y + 8, 6, 6);
                ctx.fillRect(e.x + 20, e.y + 8, 6, 6);
                
                ctx.fillStyle = e.type === 'red' ? '#cc0000' : (e.type === 'purple' ? '#6600cc' : '#0000cc');
                ctx.fillRect(e.x + e.vx > 0 ? e.x + 22 : e.x + 4, e.y + 10, 4, 4);
                
                if (e.type === 'purple') {
                    ctx.fillStyle = '#ff00ff';
                    ctx.beginPath();
                    ctx.arc(e.x + e.w/2, e.y + e.h/2 - 4, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (const p of projectiles) {
                ctx.fillStyle = '#ff00ff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            if (player.invincible % 4 < 2) {
                ctx.fillStyle = '#44aa44';
                if (player.hasDoubleJump) {
                    ctx.fillStyle = '#00cc00';
                    ctx.globalAlpha = 0.3;
                    ctx.fillRect(player.x - 4, player.y - 4, player.width + 8, player.height + 8);
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = '#44aa44';
                }
                ctx.fillRect(player.x, player.y, player.width, player.height);
                
                ctx.fillStyle = '#228822';
                ctx.fillRect(player.x + 4, player.y + 4, 8, 8);
                ctx.fillRect(player.x + 20, player.y + 4, 8, 8);
            }

            if (player.attacking) {
                ctx.fillStyle = '#ffff00';
                const ax = player.facing === 1 ? player.x + player.width : player.x - 50;
                ctx.fillRect(ax, player.y - 2, 50, 36);
            }

            for (const p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 4, 4);
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText('Health: ' + '♥'.repeat(player.health), 20, 30);
            ctx.fillText('Score: ' + score, 20, 55);
            ctx.fillText('Level: ' + level, 150, 30);
            ctx.fillText('Sword: ' + (sword.collected ? 'YES' : 'NO'), 230, 30);
            ctx.fillText('Enemies: ' + enemies.length, 330, 30);
            ctx.fillText('Torches: ' + torchCount, 450, 30);
            ctx.fillText('Gems: ' + gems.filter(g => g.collected).length, 450, 55);
            ctx.fillStyle = player.hasDoubleJump ? '#00ff00' : '#666';
            ctx.fillText('Double Jump: ' + (player.hasDoubleJump ? 'YES' : 'NO'), 550, 30);
            ctx.fillStyle = player.hasDash ? '#ff00ff' : '#666';
            ctx.fillText('Dash: ' + (player.hasDash ? 'YES(SHIFT)' : 'NO'), 550, 55);

            if (level === 10 && treasure.collected) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffd700';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('YOU BEAT ALL 10 LEVELS!', canvas.width/2, canvas.height/2);
                ctx.font = '24px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 40);
                ctx.fillText('Press R to play again', canvas.width/2, canvas.height/2 + 80);
                ctx.textAlign = 'left';
            }

            if (player.health <= 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff4444';
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('RESPAWNING...', canvas.width/2, canvas.height/2);
                ctx.textAlign = 'left';
                
                const currentLevel = level;
                const currentScore = score;
                const collectedSword = sword.collected;
                const collectedTorches = torches.map(t => t.collected);
                const collectedHearts = hearts.map(h => h.collected);
                const collectedGems = gems.map(g => g.collected);
                const collectedPowerups = powerups.map(p => p.collected);
                const bossDefeated = boss ? boss.health <= 0 : (level !== 5 && level !== 10);
                
                player.health = 3;
                player.vx = 0;
                player.vy = 0;
                player.x = levels[currentLevel - 1].playerStart.x;
                player.y = levels[currentLevel - 1].playerStart.y;
                player.hasDoubleJump = false;
                player.hasDash = false;
                player.canDoubleJump = false;
                player.canDash = false;
                player.invincible = 120;
                torchCount = 0;
                thrownTorch = null;
                projectiles = [];
                
                loadLevel(currentLevel);
                sword.collected = collectedSword;
                for (let i = 0; i < torches.length && i < collectedTorches.length; i++) {
                    torches[i].collected = collectedTorches[i];
                    if (collectedTorches[i]) torchCount++;
                }
                for (let i = 0; i < hearts.length && i < collectedHearts.length; i++) {
                    hearts[i].collected = collectedHearts[i];
                }
                for (let i = 0; i < gems.length && i < collectedGems.length; i++) {
                    gems[i].collected = collectedGems[i];
                }
                for (let i = 0; i < powerups.length && i < collectedPowerups.length; i++) {
                    powerups[i].collected = collectedPowerups[i];
                }
                
                if ((level === 5 || level === 10) && bossDefeated && boss) {
                    boss.health = 0;
                    bossActive = false;
                }
                
                score = currentScore;
            }
        }

        function initGame() {
            player.health = 3;
            player.vx = 0;
            player.vy = 0;
            score = 0;
            level = 1;
            loadLevel(1);
        }

        function saveGame() {
            const saveData = {
                level: level,
                score: score,
                playerHealth: player.health,
                timestamp: Date.now()
            };
            localStorage.setItem('platformQuestSave', JSON.stringify(saveData));
        }

        function loadGame() {
            const saveStr = localStorage.getItem('platformQuestSave');
            if (!saveStr) return false;
            
            try {
                const saveData = JSON.parse(saveStr);
                level = saveData.level || 1;
                score = saveData.score || 0;
                player.health = saveData.playerHealth || 3;
                loadLevel(level);
                return true;
            } catch (e) {
                return false;
            }
        }

        function hasSave() {
            return localStorage.getItem('platformQuestSave') !== null;
        }

        function drawTitleScreen() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffd700';
            ctx.font = '64px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('PLATFORM QUEST', canvas.width/2, 180);
            
            const saveExists = hasSave();
            
            if (saveExists) {
                ctx.fillStyle = '#3366ff';
                ctx.fillRect(canvas.width/2 - 70, 260, 140, 50);
                ctx.fillStyle = '#2255cc';
                ctx.fillRect(canvas.width/2 - 70, 260, 140, 8);
                
                ctx.fillStyle = '#fff';
                ctx.font = '22px Arial';
                ctx.fillText('CONTINUE', canvas.width/2, 295);
                
                ctx.fillStyle = '#44aa44';
                ctx.fillRect(canvas.width/2 - 50, 340, 100, 45);
                ctx.fillStyle = '#228822';
                ctx.fillRect(canvas.width/2 - 50, 340, 100, 7);
                
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText('NEW GAME', canvas.width/2, 370);
            } else {
                ctx.fillStyle = '#44aa44';
                ctx.fillRect(canvas.width/2 - 60, 300, 120, 60);
                ctx.fillStyle = '#228822';
                ctx.fillRect(canvas.width/2 - 60, 300, 120, 10);
                
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.fillText('START', canvas.width/2, 340);
            }
            
            ctx.font = '18px Arial';
            ctx.fillStyle = '#aaa';
            ctx.fillText('WASD/Arrows: Move   Space: Jump   Z/K: Attack   X/J: Throw Torch', canvas.width/2, 450);
            ctx.fillText('Kill all enemies to unlock the exit!', canvas.width/2, 480);
            
            ctx.textAlign = 'left';
        }

        function gameLoop() {
            if (gameState === 'title') {
                drawTitleScreen();
                
                const mx = mouse.x;
                const my = mouse.y;
                const saveExists = hasSave();
                
                if (mouse.clicked) {
                    mouse.clicked = false;
                    gameState = 'playing';
                    if (saveExists && mx >= canvas.width/2 - 70 && mx <= canvas.width/2 + 70 && my >= 260 && my <= 310) {
                        loadGame();
                    } else if (saveExists && mx >= canvas.width/2 - 50 && mx <= canvas.width/2 + 50 && my >= 340 && my <= 385) {
                        initGame();
                    } else if (!saveExists && mx >= canvas.width/2 - 60 && mx <= canvas.width/2 + 60 && my >= 300 && my <= 360) {
                        initGame();
                    } else {
                        gameState = 'playing';
                        initGame();
                    }
                }
                
                if (keys['Enter'] || keys['Space'] || keys['KeyZ']) {
                    gameState = 'playing';
                    if (hasSave() && keys['Enter']) {
                        loadGame();
                    } else {
                        initGame();
                    }
                }
                requestAnimationFrame(gameLoop);
                return;
            }

            if (keys['KeyR'] && (player.health <= 0 || (level === 10 && treasure.collected))) {
                localStorage.removeItem('platformQuestSave');
                initGame();
            }
            
            if (player.health > 0) {
                updatePlatforms();
                updatePlayer();
                updateEnemies();
                updateBoss();
                updateProjectiles();
            }
            updateParticles();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
